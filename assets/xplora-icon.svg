<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="bg" cx="40%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#5a1fa8"/>
      <stop offset="50%" stop-color="#2d0d75"/>
      <stop offset="100%" stop-color="#0a0420"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="white" stop-opacity="1"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Dark gradient background -->
  <circle cx="50" cy="50" r="50" fill="url(#bg)"/>
  <!-- White inner circle -->
  <circle cx="50" cy="50" r="33" fill="white"/>
  <!-- Compass needle: diamond rotated 45°, NE–SW long axis -->
  <path d="M 69 31 L 59 59 L 31 69 L 41 41 Z" fill="#160838"/>
  <!-- Center glow -->
  <circle cx="50" cy="50" r="7" fill="url(#glow)"/>
  <circle cx="50" cy="50" r="3.5" fill="white"/>
</svg>
